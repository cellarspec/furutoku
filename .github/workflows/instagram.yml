# Instagram カルーセル自動投稿(毎日12:23 JST)+ 週1トークンリフレッシュ
#
# 順序が重要: Metaは image_url(raw.githubusercontent.com)から画像を取得するため、
# レンダリング画像を main に push してから投稿する。
# セットアップ完了前(IG_TOKEN等が未設定)は投稿をスキップして正常終了する。
name: Instagram

on:
  schedule:
    # 毎時0分ちょうどはGitHub側の混雑で遅延・欠落しやすいため23分にずらしている
    - cron: '23 3 * * *' # 03:23 UTC = 12:23 JST
  workflow_dispatch:

concurrency:
  group: instagram-post
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      # secrets は if 条件で直接参照できないため、env に写して有無を出力する
      - name: クレデンシャル有無を判定
        id: creds
        env:
          IG_TOKEN: ${{ secrets.IG_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
        run: |
          if [ -n "$IG_TOKEN" ] && [ -n "$IG_USER_ID" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 依存インストール
        run: npm ci

      - name: 品質ゲート
        run: npm run check

      - name: カルーセル画像レンダリング
        run: npm run render

      - name: レンダリング画像をコミット&push(投稿前に公開URLを有効化)
        run: |
          git config user.name "furutoku-bot"
          git config user.email "actions@github.com"
          if git status --porcelain docs/ | grep -q .; then
            git add docs/
            git commit -m "render: カルーセル画像を自動生成"
            for i in 1 2 3; do
              if git push origin HEAD:main; then break; fi
              echo "push競合(${i}/3)— リトライ"
              git pull --rebase origin main
              sleep 5
            done
          else
            echo "新規レンダリングなし"
          fi

      - name: Instagramに投稿
        if: ${{ steps.creds.outputs.configured == 'true' }}
        env:
          IG_TOKEN: ${{ secrets.IG_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
        run: node scripts/post-instagram.mjs

      - name: セットアップ未完了の通知
        if: ${{ steps.creds.outputs.configured != 'true' }}
        run: echo "::notice::IG_TOKEN / IG_USER_ID が未設定のため投稿をスキップしました(SETUP.md参照)"

      - name: queueの消化をコミット&push
        if: ${{ steps.creds.outputs.configured == 'true' }}
        run: |
          git config user.name "furutoku-bot"
          git config user.email "actions@github.com"
          if git status --porcelain content/ | grep -q .; then
            git add content/
            git commit -m "queue消化: Instagram自動投稿"
            for i in 1 2 3; do
              if git push origin HEAD:main; then exit 0; fi
              echo "push競合(${i}/3)— リトライ"
              git pull --rebase origin main
              sleep 5
            done
            echo "::warning::queue更新のpushに3回失敗。次回実行時に重複投稿の可能性があります"
            exit 1
          else
            echo "queue変更なし(投稿スキップまたは失敗)"
          fi

      # 毎週日曜のみ: 長期トークン(60日)を ig_refresh_token で延長し、GH_PATが
      # あればシークレットを自動更新する。アプリシークレットは不要(Threadsと同じ方式)。
      - name: トークンリフレッシュ(日曜のみ)
        if: ${{ always() && steps.creds.outputs.configured == 'true' }}
        env:
          IG_TOKEN: ${{ secrets.IG_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          if [ "$(date -u +%u)" != "7" ]; then
            echo "今日は日曜ではないためリフレッシュをスキップ"
            exit 0
          fi
          if [ -z "$GH_PAT" ]; then
            echo "::warning::GH_PAT が未設定のため IG_TOKEN の自動更新はできません。長期トークンは約60日で失効します(SETUP.md参照)。"
            exit 0
          fi
          OUTPUT=$(REFRESH=1 node scripts/post-instagram.mjs)
          echo "$OUTPUT" | grep -v '^NEW_TOKEN='
          NEW_TOKEN=$(echo "$OUTPUT" | grep '^NEW_TOKEN=' | cut -d= -f2-)
          if [ -z "$NEW_TOKEN" ]; then
            echo "::warning::リフレッシュ結果からトークンを取得できませんでした"
            exit 1
          fi
          echo "$NEW_TOKEN" | GH_TOKEN="$GH_PAT" gh secret set IG_TOKEN --repo "${{ github.repository }}"
          echo "IG_TOKEN シークレットを更新しました"
